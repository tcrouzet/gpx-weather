name: Actualiser la carte météo

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 */3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-pages.txt
      - run: pip install -r requirements-pages.txt
      - name: Générer les prévisions avec reprise réseau
        run: |
          for attempt in 1 2 3; do
            python app.py && break
            if [ "$attempt" -eq 3 ]; then exit 1; fi
            echo "Open-Meteo indisponible, nouvelle tentative dans 30 secondes..."
            sleep 30
          done
      - name: Préparer les pages des parcours
        run: |
          mkdir -p _site
          cp _output/index.html _site/index.html
          for page in _output/*/index.html; do
            slug="$(basename "$(dirname "$page")")"
            mkdir -p "_site/$slug"
            cp "$page" "_site/$slug/index.html"
          done
      - name: Installer Chrome pour la vignette
        id: chrome
        uses: browser-actions/setup-chrome@v2
      - name: Capturer la vignette de partage
        run: |
          python -m http.server 8000 --directory _site >/tmp/gpx-weather-http.log 2>&1 &
          for page in _site/*/index.html; do
            slug="$(basename "$(dirname "$page")")"
            "${{ steps.chrome.outputs.chrome-path }}" \
              --headless --disable-gpu --no-sandbox \
              --hide-scrollbars --window-size=1200,630 \
              --virtual-time-budget=8000 \
              --screenshot="$GITHUB_WORKSPACE/_site/$slug/preview.png" \
              "http://127.0.0.1:8000/$slug/"
            test -s "_site/$slug/preview.png"
          done
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publier sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
